<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職場不法侵害 裁判書檢索系統</title>
    <!-- Google Fonts: Noto Sans TC for traditional chinese -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    <h1>職場不法侵害 裁判書檢索系統</h1>
                </div>
                <p class="subtitle">針對預先抓取之民、刑、行政裁判書「主文」進行快速二次檢索</p>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" placeholder="輸入關鍵字以過濾「主文」內容 (例如: 駁回、賠償)..." autocomplete="off">
            </div>
            <div class="filter-stats" id="statsDisplay">
                載入資料中...
            </div>
        </section>

        <!-- Results Section -->
        <main class="results-section">
            <div id="resultsList" class="results-list">
                <!-- Data cards will be injected here by JS -->
            </div>
        </main>
    </div>

    <!-- Modal for full text -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modalTitle">裁判字號</h2>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-body">
                <h3>主文</h3>
                <div id="modalMainText" class="text-block main-text-block"></div>
                <h3>完整內容</h3>
                <div id="modalFullText" class="text-block"></div>
                <a id="modalLink" href="#" target="_blank" class="primary-btn">前往司法院查看原始網頁</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
